Ansible:
  - ansible-inventory -i <inventory file> --list
  - ansible-inventory -i <inventory file> --host=<group>
  - ansible-inventory -i <inventory file> -y --list

Docker:
  - curl -n -sv 'https://docker.apple.com/v2/base-images/ubi9-minimal/ubi-minimal/tags/list' | jq .

Kubernetes:
  - kgpo acc-api-dev-586df66c4c-mpdcf --output json | jq '.spec.containers[].name'
  - kgpo acc-api-dev-586df66c4c-mpdcf --output=jsonpath='{.spec.containers[*].name}'
  - kgd vendorvue-aggregation-it --output=json | jq '.spec.template.spec.containers[] | "\(.name)  \(.image)"'
  - kgd vendorvue-aggregation-it --output=jsonpath='{@.spec.template.spec.containers[*].name}{" "}{@.spec.template.spec.containers[*].image}'
  - kgd -o=jsonpath='{range .items[*]}{@.metadata.name}{"\n"}{range @.spec.template.spec.initContainers[*]}{@.name}{" "}{@.image}{"\n"}{end}{range @.spec.template.spec.containers[*]}{@.name}{" "}{@.image}{"\n"}{end}{end}'
  - kgd -o jsonpath='{range .items[*]}{@.metadata.name}{"\n"}{@.spec.template.spec.initContainers[0].name}{"   "}{@.spec.template.spec.initContainers[0].image}{"\n"}{range @.spec.template.spec.containers[*]}{@.name}{"   "}{@.image}{"\n"}{end}{end}'
  - kubectl exec -i -t <pod name> --container <container name> -- /bin/bash
  - kubectl set image deploy/<deployname> <container_name>=<new_image:version> #kcl set image deploy/vendorvue-aggregation-it splunkforwarder=docker.apple.com/splunk-ist/splunk-universalforwarder:9.3.4
  - kubectl get pods -o=jsonpath='{range .items[*]}[{.spec.containers[0].name},{.spec.containers[0].image}]{end}'
  - kubectl get deploy -o jsonpath='{range .items[*]}[{.spec.template.spec.initContainers[0].name},{.spec.template.spec.initContainers[0].image}]{end}' | sed -e 's/\]\[/\n/g'
  - kget rollouts -o=jsonpath='{range .items[*]}{@.metadata.name}{"\n"}{range @.spec.template.spec.containers[*]}{@.name}{" "}{@.image}{"\n"}{end}{end}'
  - kubectl auth can-i --list --as=system:serviceaccount:my-namespace:my-service-account
  - kubectl auth can-i get pods -n my-namespace --as=system:serviceaccount:my-namespace:my-service-account
  - kubectl patch hpa <hpa-name> --type='json' -p='[{"op": "replace", "path": "/spec/minReplicas", "value": 4}]'

Linux:
  - Check ciphers on the box
    openssl ciphers -v | awk '{print $2}' | sort | uniq
  - Execute commands on all files in a directory
      find /some/directory -maxdepth 1 -type f -exec cmd option {} \; > results.out
        - -maxdepth 1 argument prevents find from recursively descending into any subdirectories. (If you want such nested directories to get processed, you can omit this.)
        - -type -f specifies that only plain files will be processed.
        - -exec cmd option {} tells it to run cmd with the specified option for each file found, with the filename substituted for {}
        - \; denotes the end of the command.
        - Finally, the output from all the individual cmd executions is redirected to results.out
