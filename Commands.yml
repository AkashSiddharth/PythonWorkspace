    - aws configservice get-compliance-details-by-config-rule --config-rule-name ais-require-tagging-compliance-rule --compliance-types NON_COMPLIANT

    - aws configservice get-compliance-details-by-config-rule --config-rule-name aais-require-tagging-compliance-rule --compliance-types NON_COMPLIANT --query "EvaluationResults[*].EvaluationResultIdentifier.EvaluationResultQualifier[?ResourceType == 'AWS::Cassandra::Keyspace'].ResourceId" > out.json

